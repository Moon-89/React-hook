<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>React Projects · Mini App Gallery</title>
  <meta name="description" content="A gallery of small React apps built with hooks — accordion, color generator, star rating, image slider, and more." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Sora:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #070b16;
      --panel: #10182b;
      --panel-2: #0b1120;
      --border: #1e2a44;
      --text: #eef2fb;
      --muted: #93a1bf;
      --faint: #5b6b84;
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      background: var(--bg);
      overflow-x: hidden;
    }
    a { text-decoration: none; color: inherit; }

    /* animated background blobs */
    .bg { position: fixed; inset: 0; z-index: -1; overflow: hidden; }
    .blob { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.5; animation: float 18s ease-in-out infinite; }
    .blob.b1 { width: 480px; height: 480px; top: -120px; left: -80px; background: #6366f1; }
    .blob.b2 { width: 420px; height: 420px; top: 10%; right: -120px; background: #ec4899; animation-delay: -6s; }
    .blob.b3 { width: 380px; height: 380px; bottom: -140px; left: 30%; background: #0ea5e9; animation-delay: -11s; }
    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(40px, -30px) scale(1.08); }
      66% { transform: translate(-30px, 20px) scale(0.96); }
    }

    .wrap { max-width: 1120px; margin: 0 auto; padding: clamp(48px, 8vw, 96px) 20px 80px; }

    /* hero */
    .hero { text-align: center; margin-bottom: clamp(44px, 7vw, 72px); }
    .eyebrow {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 0.76rem; font-weight: 600; letter-spacing: 0.6px; text-transform: uppercase;
      color: #a5b4fc;
      background: rgba(99, 102, 241, 0.12);
      border: 1px solid rgba(99, 102, 241, 0.3);
      padding: 7px 15px; border-radius: 999px; margin-bottom: 24px;
      animation: rise 0.6s var(--ease) both;
    }
    .eyebrow .pulse { width: 7px; height: 7px; border-radius: 50%; background: #818cf8; box-shadow: 0 0 0 0 rgba(129,140,248,.7); animation: ping 2s infinite; }
    @keyframes ping { 0% { box-shadow: 0 0 0 0 rgba(129,140,248,.6);} 70%,100% { box-shadow: 0 0 0 8px rgba(129,140,248,0);} }
    h1 {
      font-family: "Sora", "Inter", sans-serif;
      font-size: clamp(2.4rem, 8vw, 4.6rem);
      font-weight: 800; line-height: 1.02; letter-spacing: -2px;
      animation: rise 0.6s var(--ease) 0.05s both;
    }
    h1 .grad {
      background: linear-gradient(115deg, #818cf8, #c084fc 40%, #f472b6 70%, #fb923c);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .sub {
      color: var(--muted); max-width: 560px; margin: 20px auto 0;
      font-size: clamp(1rem, 2.6vw, 1.18rem); line-height: 1.6;
      animation: rise 0.6s var(--ease) 0.1s both;
    }
    .meta {
      display: flex; gap: 26px; justify-content: center; flex-wrap: wrap;
      margin-top: 28px; color: var(--faint); font-size: 0.85rem;
      animation: rise 0.6s var(--ease) 0.15s both;
    }
    .meta b { color: var(--text); font-weight: 700; }

    /* grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
    }
    .card {
      position: relative;
      display: flex; flex-direction: column;
      background: linear-gradient(180deg, var(--panel), var(--panel-2));
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 24px;
      overflow: hidden;
      animation: rise 0.55s var(--ease) both;
      transition: transform 0.28s var(--ease), border-color 0.28s, box-shadow 0.28s;
    }
    .card::before {
      content: ""; position: absolute; inset: 0;
      background: radial-gradient(130% 90% at 100% 0%, var(--glow), transparent 55%);
      opacity: 0; transition: opacity 0.28s;
    }
    .card:hover { transform: translateY(-7px); border-color: var(--edge); box-shadow: 0 30px 60px -24px rgba(0,0,0,.8); }
    .card:hover::before { opacity: 0.22; }
    .card > * { position: relative; }

    .card .top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
    .icon {
      display: grid; place-items: center;
      width: 54px; height: 54px; border-radius: 15px;
      font-size: 1.7rem;
      background: var(--tile);
      box-shadow: 0 10px 24px -10px var(--edge), inset 0 1px 0 rgba(255,255,255,.15);
    }
    .num { font-family: "Sora", sans-serif; font-size: 1.7rem; font-weight: 800; color: var(--border); letter-spacing: -1px; transition: color .28s; }
    .card:hover .num { color: var(--edge); }
    .card h2 { font-size: 1.22rem; font-weight: 700; letter-spacing: -0.3px; }
    .card p { color: var(--muted); font-size: 0.88rem; line-height: 1.55; margin: 8px 0 16px; flex: 1; }
    .tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 18px; }
    .tag {
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 0.67rem; color: var(--muted);
      background: rgba(255,255,255,.04); border: 1px solid var(--border);
      padding: 3px 9px; border-radius: 999px;
    }
    .go {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 0.85rem; font-weight: 600; color: var(--edge);
      transition: gap 0.2s;
    }
    .card:hover .go { gap: 11px; }

    footer { text-align: center; margin-top: 56px; color: var(--faint); font-size: 0.85rem; }
    footer a { color: var(--muted); border-bottom: 1px solid var(--border); padding-bottom: 1px; }
    footer a:hover { color: var(--text); }

    @keyframes rise { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } .blob { display: none; } }
  </style>
</head>
<body>
  <div class="bg"><span class="blob b1"></span><span class="blob b2"></span><span class="blob b3"></span></div>

  <div class="wrap">
    <header class="hero">
      <span class="eyebrow"><span class="pulse"></span> Built with React 18 + Vite</span>
      <h1>React <span class="grad">Mini Apps</span></h1>
      <p class="sub">A hands-on gallery of small projects exploring React hooks — state, effects, refs, context and routing — one focused idea each.</p>
      <div class="meta">
        <span><b>8</b> projects</span>
        <span><b>useState</b> · <b>useEffect</b> · <b>useRef</b></span>
        <span>Context · Router</span>
      </div>
    </header>

    <main class="grid" id="grid"></main>

    <footer>
      Crafted with React &amp; Vite ·
      <a href="https://github.com/Moon-89/React-hook" target="_blank" rel="noreferrer">View source on GitHub</a>
    </footer>
  </div>

  <script>
    const PROJECTS = [
      { num: "01", slug: "accordion",       title: "Accordion",         icon: "🪗", desc: "Single & multi-select FAQ panels that expand and collapse.", tags: ["useState"], c1: "#6366f1", c2: "#8b5cf6" },
      { num: "02", slug: "color-generator", title: "Color Generator",   icon: "🎨", desc: "Generate random HEX or RGB colors with a live background.", tags: ["useState", "useEffect"], c1: "#ec4899", c2: "#f43f5e" },
      { num: "03", slug: "star-rating",     title: "Star Rating",       icon: "⭐", desc: "Interactive stars with hover preview and click to rate.", tags: ["useState"], c1: "#f59e0b", c2: "#f97316" },
      { num: "04", slug: "image-slider",    title: "Image Slider",      icon: "🖼️", desc: "A carousel with arrows and dots, images from an API.", tags: ["useState", "useEffect"], c1: "#06b6d4", c2: "#0ea5e9" },
      { num: "05", slug: "load-more",       title: "Load More",         icon: "📦", desc: "Paginated product grid that fetches in batches.", tags: ["useState", "useEffect"], c1: "#10b981", c2: "#22c55e" },
      { num: "06", slug: "recursive-menu",  title: "Recursive Menu",    icon: "🌳", desc: "A nested sidebar navigation built with recursion.", tags: ["useState"], c1: "#3b82f6", c2: "#2563eb" },
      { num: "07", slug: "weather-app",     title: "Weather App",       icon: "⛅", desc: "Live weather for any city — search and see the forecast.", tags: ["useState", "useEffect"], c1: "#0ea5e9", c2: "#38bdf8" },
      { num: "08", slug: "food-recipe",     title: "Food Recipe",       icon: "🍳", desc: "Search recipes, view details, and save your favorites.", tags: ["Context", "Router"], c1: "#f97316", c2: "#ef4444" },
    ];

    document.getElementById("grid").innerHTML = PROJECTS.map((p, i) => `
      <a class="card" href="./${p.slug}/" style="
        --tile: linear-gradient(135deg, ${p.c1}, ${p.c2});
        --glow: ${p.c1}; --edge: ${p.c2};
        animation-delay: ${i * 55}ms;">
        <div class="top">
          <span class="icon">${p.icon}</span>
          <span class="num">${p.num}</span>
        </div>
        <h2>${p.title}</h2>
        <p>${p.desc}</p>
        <div class="tags">${p.tags.map(t => `<span class="tag">${t}</span>`).join("")}</div>
        <span class="go">Open project →</span>
      </a>`).join("");
  </script>
</body>
</html>
