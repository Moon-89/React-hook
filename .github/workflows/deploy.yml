name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build landing page + all projects
        run: |
          set -e
          PROJECTS="accordion color-generator star-rating image-slider load-more recursive-menu weather-app food-recipe"
          rm -rf _site
          mkdir -p _site
          # landing page at the site root
          cp landing/index.html _site/index.html
          # each project built into its own subfolder
          for p in $PROJECTS; do
            echo "::group::Building $p"
            (cd "$p" && npm ci && npm run build)
            mkdir -p "_site/$p"
            cp -r "$p/dist/." "_site/$p/"
            echo "::endgroup::"
          done

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
